name: Promptfoo Evals

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    paths:
      - 'backend/seeker_os/analysis/prompts/**'
      - 'backend/seeker_os/resume/prompts/**'
      - 'backend/seeker_os/validation/prompts/**'
      - 'config/providers*.yml'
      - 'config/accuracy_rules*.yml'
      - 'config/identity_rules*.yml'
      - 'config/scoring_rubric*.yml'
      - 'config/channel_rules*.yml'
      - 'evals/**'
  push:
    branches: [main]

jobs:
  # Detect whether to run smoke or full eval
  detect-mode:
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.mode.outputs.mode }}
    steps:
      - id: mode
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "mode=full" >> "$GITHUB_OUTPUT"
          elif [[ "${{ contains(github.event.pull_request.labels.*.name, 'full-eval') }}" == "true" ]]; then
            echo "mode=full" >> "$GITHUB_OUTPUT"
          else
            echo "mode=smoke" >> "$GITHUB_OUTPUT"
          fi

  evals:
    needs: detect-mode
    runs-on: ubuntu-latest
    env:
      MODE: ${{ needs.detect-mode.outputs.mode }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SEEKER_OS_CONFIG_DIR: config
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install promptfoo
        run: npm install -g promptfoo

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install pyyaml pydantic

      - name: Seed config from example templates
        run: |
          # Real config files (profile.yml, accuracy_rules.yml, etc.) are
          # gitignored because they contain personal data. In CI, copy the
          # committed *.example.yml templates to the real filenames so the
          # prompt-building helpers can load them. The evals test prompt
          # regression behavior, not absolute accuracy against a specific
          # candidate profile.
          for example in config/*.example.yml; do
            real="${example%.example.yml}.yml"
            if [ ! -f "$real" ]; then
              cp "$example" "$real"
              echo "Seeded $real from $example"
            fi
          done
          # Also seed blacklist from example
          if [ ! -f config/blacklist.txt ] && [ -f config/blacklist.example.txt ]; then
            cp config/blacklist.example.txt config/blacklist.txt
          fi
          # Seed master resume (gitignored in production, needed by resume eval)
          if [ ! -f data/master_resume.md ] && [ -f data/master_resume.example.md ]; then
            cp data/master_resume.example.md data/master_resume.md
            echo "Seeded data/master_resume.md from example"
          fi

      - name: Verify golden dataset exists
        run: |
          if [ ! -f evals/golden_dataset.yml ]; then
            echo "::error::Golden dataset not found at evals/golden_dataset.yml"
            exit 1
          fi
          cases=$(python3 -c "import yaml; print(len([c for c in yaml.safe_load(open('evals/golden_dataset.yml'))['cases'] if c.get('status','active')=='active']))")
          echo "Active cases: $cases"
          if [ "$cases" -lt 5 ]; then
            echo "::error::Not enough active cases in golden dataset (need >= 5)"
            exit 1
          fi

      - name: Run JD analysis eval (smoke)
        if: env.MODE == 'smoke'
        run: |
          # Smoke mode: run with a subset of cases
          # promptfoo eval with --filter to limit cases
          promptfoo eval --config evals/promptfoo/jd_analysis.yaml \
            --no-cache \
            --output evals/results/jd_analysis_smoke.json \
            --max-concurrency 3 || echo "EVAL_FAILED=true" >> "$GITHUB_ENV"

      - name: Run JD analysis eval (full)
        if: env.MODE == 'full'
        run: |
          promptfoo eval --config evals/promptfoo/jd_analysis.yaml \
            --no-cache \
            --output evals/results/jd_analysis_full.json \
            --max-concurrency 3 || echo "EVAL_FAILED=true" >> "$GITHUB_ENV"

      - name: Run resume generation eval (smoke)
        if: env.MODE == 'smoke'
        run: |
          promptfoo eval --config evals/promptfoo/resume_generation.yaml \
            --no-cache \
            --output evals/results/resume_generation_smoke.json \
            --max-concurrency 2 || echo "EVAL_FAILED=true" >> "$GITHUB_ENV"

      - name: Run resume generation eval (full)
        if: env.MODE == 'full'
        run: |
          promptfoo eval --config evals/promptfoo/resume_generation.yaml \
            --no-cache \
            --output evals/results/resume_generation_full.json \
            --max-concurrency 2 || echo "EVAL_FAILED=true" >> "$GITHUB_ENV"

      - name: Parse results and check thresholds
        if: always()
        run: |
          python3 - <<'PYEOF'
          import json, os, sys

          mode = os.environ.get("MODE", "smoke")
          thresholds = {
              "verdict_accuracy": 0.85,
              "faithfulness_pass_rate": 1.0,
          }

          results = {}
          for name, path in [
              ("jd_analysis", f"evals/results/jd_analysis_{mode}.json"),
              ("resume_generation", f"evals/results/resume_generation_{mode}.json"),
          ]:
              if not os.path.exists(path):
                  print(f"::warning::No results for {name} ({path} not found)")
                  results[name] = None
                  continue
              with open(path) as f:
                  data = json.load(f)
              tests = data.get("results", {}).get("results", [])
              if not tests:
                  print(f"::warning::No test results in {name}")
                  results[name] = None
                  continue
              passed = sum(1 for t in tests if t.get("success"))
              total = len(tests)
              rate = passed / total if total > 0 else 0
              results[name] = {"passed": passed, "total": total, "rate": rate}
              print(f"{name}: {passed}/{total} passed ({rate:.1%})")

          # Check thresholds (full mode only)
          failed = False
          if mode == "full":
              jd = results.get("jd_analysis")
              if jd:
                  if jd["rate"] < thresholds["verdict_accuracy"]:
                      print(f"::error::JD analysis verdict accuracy {jd['rate']:.1%} below threshold {thresholds['verdict_accuracy']:.0%}")
                      failed = True
              resume = results.get("resume_generation")
              if resume:
                  if resume["rate"] < thresholds["faithfulness_pass_rate"]:
                      print(f"::error::Resume faithfulness pass rate {resume['rate']:.1%} below threshold {thresholds['faithfulness_pass_rate']:.0%}")
                      failed = True

          if os.environ.get("EVAL_FAILED") == "true":
              print("::error::One or more eval runs failed")
              failed = True

          if failed:
              sys.exit(1)
          else:
              print("::notice::All eval thresholds passed")
          PYEOF

      - name: Post PR comment with results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const mode = process.env.MODE;
            let body = `## Promptfoo Eval Results (${mode} mode)\n\n`;

            for (const [name, file] of [
              ['JD Analysis', `evals/results/jd_analysis_${mode}.json`],
              ['Resume Generation', `evals/results/resume_generation_${mode}.json`],
            ]) {
              try {
                const data = JSON.parse(fs.readFileSync(file, 'utf8'));
                const tests = data.results?.results || [];
                const passed = tests.filter(t => t.success).length;
                const total = tests.length;
                const rate = total > 0 ? (passed / total * 100).toFixed(1) : 'N/A';
                const emoji = total > 0 && passed === total ? '✅' : passed > 0 ? '⚠️' : '❌';
                body += `### ${emoji} ${name}\n${passed}/${total} passed (${rate}%)\n\n`;
              } catch {
                body += `### ❌ ${name}\nNo results\n\n`;
              }
            }

            body += `\n[View full results](https://github.com/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})`;

            github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body,
            });
