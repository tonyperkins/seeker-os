<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#222222"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#888888"/>
      <stop offset="100%" stop-color="#bbbbbb"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- Logo / Icon: Radar/Seeker -->
  <g transform="translate(100, 200)">
    <!-- Radar circle -->
    <circle cx="60" cy="60" r="55" fill="none" stroke="#444444" stroke-width="2"/>
    <circle cx="60" cy="60" r="38" fill="none" stroke="#333333" stroke-width="1.5"/>
    <circle cx="60" cy="60" r="20" fill="none" stroke="#333333" stroke-width="1.5"/>
    <!-- Crosshair -->
    <line x1="60" y1="2" x2="60" y2="118" stroke="#333333" stroke-width="1"/>
    <line x1="2" y1="60" x2="118" y2="60" stroke="#333333" stroke-width="1"/>
    <!-- Sweep -->
    <path d="M 60 60 L 115 60 A 55 55 0 0 0 82 8 Z" fill="url(#accentGrad)" opacity="0.15"/>
    <!-- Target dot -->
    <circle cx="92" cy="35" r="5" fill="#e0e0e0"/>
    <circle cx="92" cy="35" r="9" fill="none" stroke="#e0e0e0" stroke-width="1" opacity="0.5"/>
    <!-- Center dot -->
    <circle cx="60" cy="60" r="3" fill="#888888"/>
  </g>

  <!-- Title -->
  <text x="240" y="240" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="700" fill="#f5f5f5" letter-spacing="-1">Seeker OS</text>

  <!-- Tagline -->
  <text x="244" y="285" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="400" fill="#999999">A structured, dashboard-driven job search pipeline</text>

  <!-- Feature pills -->
  <g transform="translate(244, 330)">
    <!-- Pill 1 -->
    <rect x="0" y="0" width="150" height="38" rx="19" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="1"/>
    <text x="75" y="25" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="#cccccc" text-anchor="middle">AI Scoring</text>

    <!-- Pill 2 -->
    <rect x="165" y="0" width="175" height="38" rx="19" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="1"/>
    <text x="252" y="25" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="#cccccc" text-anchor="middle">Resume Generation</text>

    <!-- Pill 3 -->
    <rect x="355" y="0" width="165" height="38" rx="19" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="1"/>
    <text x="437" y="25" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="#cccccc" text-anchor="middle">Company Research</text>

    <!-- Pill 4 -->
    <rect x="535" y="0" width="170" height="38" rx="19" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="1"/>
    <text x="620" y="25" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="#cccccc" text-anchor="middle">Kanban Tracking</text>
  </g>

  <!-- Tech stack -->
  <text x="244" y="410" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="400" fill="#666666">FastAPI · Next.js · SQLite · Multi-provider LLM routing</text>

  <!-- Mini dashboard preview card (right side) -->
  <g transform="translate(820, 140)" filter="url(#shadow)">
    <!-- Card background -->
    <rect x="0" y="0" width="380" height="360" rx="12" fill="url(#cardGrad)" stroke="#333333" stroke-width="1"/>

    <!-- Card header -->
    <rect x="0" y="0" width="380" height="48" rx="12" fill="#2f2f2f"/>
    <rect x="0" y="36" width="380" height="12" fill="#2f2f2f"/>
    <circle cx="24" cy="24" r="6" fill="#555555"/>
    <circle cx="42" cy="24" r="6" fill="#444444"/>
    <circle cx="60" cy="24" r="6" fill="#3a3a3a"/>
    <text x="190" y="29" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#888888" text-anchor="middle">Dashboard</text>

    <!-- Funnel bars -->
    <text x="24" y="80" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="#777777">PIPELINE FUNNEL</text>

    <rect x="24" y="92" width="332" height="24" rx="4" fill="#3a3a3a"/>
    <rect x="24" y="92" width="280" height="24" rx="4" fill="#e0e0e0"/>
    <text x="36" y="108" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#1a1a1a">Discovered · 142</text>

    <rect x="24" y="124" width="332" height="24" rx="4" fill="#3a3a3a"/>
    <rect x="24" y="124" width="210" height="24" rx="4" fill="#bbbbbb"/>
    <text x="36" y="140" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#1a1a1a">Filtered · 89</text>

    <rect x="24" y="156" width="332" height="24" rx="4" fill="#3a3a3a"/>
    <rect x="24" y="156" width="140" height="24" rx="4" fill="#999999"/>
    <text x="36" y="172" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#1a1a1a">Scored · 47</text>

    <rect x="24" y="188" width="332" height="24" rx="4" fill="#3a3a3a"/>
    <rect x="24" y="188" width="70" height="24" rx="4" fill="#777777"/>
    <text x="36" y="204" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#f5f5f5">Ready · 18</text>

    <!-- Divider -->
    <line x1="24" y1="232" x2="356" y2="232" stroke="#333333" stroke-width="1"/>

    <!-- Top matches section -->
    <text x="24" y="256" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="#777777">TOP MATCHES</text>

    <!-- Match row 1 -->
    <rect x="24" y="268" width="332" height="28" rx="6" fill="#2e2e2e"/>
    <rect x="24" y="268" width="4" height="28" rx="2" fill="#e0e0e0"/>
    <text x="38" y="286" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#cccccc">Senior SRE · Northwind Robotics</text>
    <rect x="310" y="274" width="38" height="16" rx="8" fill="#3a3a3a"/>
    <text x="329" y="286" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="600" fill="#e0e0e0" text-anchor="middle">92</text>

    <!-- Match row 2 -->
    <rect x="24" y="302" width="332" height="28" rx="6" fill="#2e2e2e"/>
    <rect x="24" y="302" width="4" height="28" rx="2" fill="#bbbbbb"/>
    <text x="38" y="320" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#cccccc">Staff Platform Eng · Atlas Ledger</text>
    <rect x="310" y="308" width="38" height="16" rx="8" fill="#3a3a3a"/>
    <text x="329" y="320" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="600" fill="#bbbbbb" text-anchor="middle">87</text>

    <!-- Match row 3 -->
    <rect x="24" y="336" width="332" height="28" rx="6" fill="#2e2e2e"/>
    <rect x="24" y="336" width="4" height="28" rx="2" fill="#999999"/>
    <text x="38" y="354" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#cccccc">DevOps Lead · Harbor Health</text>
    <rect x="310" y="342" width="38" height="16" rx="8" fill="#3a3a3a"/>
    <text x="329" y="354" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="600" fill="#999999" text-anchor="middle">81</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="636" width="1280" height="4" fill="url(#accentGrad)" opacity="0.3"/>
</svg>
