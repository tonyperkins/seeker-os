services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        - INSTALL_BROWSER=${INSTALL_BROWSER:-true}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
    environment:
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      - SEEKER_TELEMETRY_HMAC_KEY=${SEEKER_TELEMETRY_HMAC_KEY:-}
      # API keys are NOT passed through here. When the host var is unset,
      # ${VAR:-} evaluates to empty string, and load_dotenv(override=False)
      # treats that as "already set" — blocking the real key in data/.env.
      # Instead, keys live in data/.env (mounted volume, persists across
      # rebuilds) and are loaded by load_dotenv at startup.
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - SERVER_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: seekeros
