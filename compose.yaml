services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./.env:/app/.env
    environment:
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      # API keys — passthrough from host env (optional). If set, they take
      # precedence over .env (load_dotenv uses override=False). If unset,
      # load_dotenv fills them from the mounted .env file instead.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - KILO_API_KEY=${KILO_API_KEY:-}
      - RETRIEVAL_API_KEY=${RETRIEVAL_API_KEY:-}
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:3000"
    environment:
      - SERVER_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
