# Seeker OS — Filter Configuration (EXAMPLE TEMPLATE)
# Copy to filters.yml and adjust. This file contains no personal data
# and can be committed. Personal values are in profile.yml.

filters:
  remote_only: true
  us_only: true

  # See docs/HIRINGCAFE_FIELDS.md § Seniority Enum for why this is so coarse.
  seniority_floor: ["Senior Level"]
  seniority_reject: ["Mid Level", "Entry Level", "Junior", "Associate"]
  seniority_unknown_passes: true

  # Comp floor is NOT here — it lives in profile.comp.floor (canonical source).
  # comp_floor_margin_pct applies a tolerance below profile.comp.floor.
  # comp_unknown_passes controls whether jobs with no comp data pass or are rejected.

  freshness_days: 30
  commitment_required: "Full Time"

title_filters:
  # Customize these for your target role(s)
  positive:
    - senior engineer
    - staff engineer
    - principal engineer
  negative:
    - manager
    - director
    - head of
    - vp
    - vice president
    - intern
    - junior
