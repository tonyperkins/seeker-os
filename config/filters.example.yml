# Seeker OS — Filter Configuration (EXAMPLE TEMPLATE)
# Copy to filters.yml and adjust. This file contains no personal data
# and can be committed. Personal values are in profile.yml.

filters:
  remote_only: true
  us_only: true

  # See docs/HIRINGCAFE_FIELDS.md § Seniority Enum for why this is so coarse.
  seniority_floor: ["Senior Level"]
  seniority_reject: ["Mid Level", "Entry Level", "Junior", "Associate"]
  seniority_unknown_passes: true
  # If title contains any of these patterns, pass regardless of seniority_level tag.
  seniority_title_override: []
  # comp_floor_margin_pct: tolerance below profile.comp.floor (percentage).
  # E.g. 10 = jobs with comp_max >= floor * 0.9 pass the comp floor check.
  comp_floor_margin_pct: 0
  # comp_unknown_passes: if True, jobs with no comp data pass; if False, rejected.
  comp_unknown_passes: true
  # Comp provenance: values above this are implausible regardless of source.
  # Treated as comp-unknown in the filter (does not clear the floor).
  # Prevents the $130,000 → 130000000 misparse from clearing the comp floor.
  comp_sanity_max: 10000000

  freshness_days: 30
  commitment_required: "Full Time"
  # Locations to exclude even if us_only passes (states or cities).
  location_exclude: []
  # Cities where hybrid jobs are allowed even when remote_only=true.
  # Hybrid jobs whose location contains any of these city names pass the filter.
  # Leave empty to reject all non-remote jobs (strict remote-only).
  hybrid_accepted_cities: []
  # If True, only pass jobs that offer visa sponsorship.
  visa_sponsorship_required: false
  # Junior-level title patterns for fallback filtering when seniority_level
  # is None and seniority_unknown_passes is False. Empty this list if you
  # are targeting junior-level roles.
  junior_title_patterns:
    - junior
    - entry
    - associate
    - intern
    - new grad
    - early career

title_filters:
  # Customize these for your target role(s) and seniority level
  positive:
    - senior engineer
    - staff engineer
    - principal engineer
  negative:
    - intern
    - junior
    - top secret
    - ts/sci
    - polygraph
    - secret clearance
    # Uncomment these if targeting IC roles only:
    # - manager
    # - vp
    # - vice president
