# Seeker OS — Resume Accuracy Rules (EXAMPLE TEMPLATE)
# Copy to accuracy_rules.yml and adjust. accuracy_rules.yml is .gitignore'd.
# Schema is defined in Phase 1; validation begins in Phase 3.
# See docs/ACCURACY_RULES.md for the full reference.

rules:
  - id: aws_depth
    description: "Never claim deep AWS expertise or year count"
    type: disallowed_phrases
    phrases: ["deep aws expertise", "aws expert", "since aws launch"]
    severity: high

  - id: azure_depth
    description: "Never claim deep independent Azure expertise"
    type: disallowed_phrases
    phrases: ["azure expert", "deep azure"]
    severity: high

  - id: gcp_depth
    description: "Never claim production GCP depth"
    type: disallowed_phrases
    phrases: ["gcp experience", "google cloud production", "gcp expertise"]
    severity: high

  - id: powershell_depth
    description: "Never claim PowerShell depth/mastery"
    type: disallowed_phrases
    phrases: ["powershell expert", "powershell mastery", "strong powershell"]
    severity: high

  - id: ansible_current
    description: "Never claim Ansible as current competency"
    type: disallowed_phrases
    phrases: ["ansible expertise", "current ansible experience"]
    severity: high

  - id: k8s_depth
    description: "Never claim Kubernetes cluster administration depth"
    type: disallowed_phrases
    phrases: ["kubernetes admin", "kubernetes expert", "deep k8s", "cluster administration", "k8s architect"]
    severity: high

  - id: go_primary
    description: "Never claim Go as primary language"
    type: disallowed_phrases
    phrases: ["go expert", "go primary language", "deep go", "go proficiency"]
    severity: medium

  - id: spinnaker_depth
    description: "Never claim Spinnaker operational depth"
    type: disallowed_phrases
    phrases: ["spinnaker expertise", "operated spinnaker", "spinnaker administration"]
    severity: medium

  - id: experience_anchor
    description: "Use '25+ years' only, attached to overall career not cloud"
    type: disallowed_phrases
    phrases: ["20+ years", "30+ years", "25+ years in cloud", "25+ years in devops"]
    severity: medium

  - id: education_omission
    description: "Omit education entirely"
    type: disallowed_phrases
    phrases: ["devry", "electronics engineering technology"]
    severity: medium

  - id: never_claim_tech
    description: "These technologies must NEVER appear in generated resumes"
    type: forbidden_technologies
    technologies: ["ArgoCD", "Helm", "Kargo", "Consul", "Vault", "Rust", "Temporal"]
    severity: high

  - id: contact_urls_visible
    description: "Always render full literal https:// URLs as visible text"
    type: required_phrases
    phrases: ["https://perkinslab.com", "https://linkedin.com/in/tonyperkins", "https://github.com/tonyperkins"]
    severity: medium
