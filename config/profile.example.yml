# Seeker OS — User Profile (EXAMPLE TEMPLATE)
# Copy to profile.yml and fill in your values. profile.yml is .gitignore'd.

user:
  name: "Your Name"
  email: "you@example.com"
  location: "Your City, ST"

location:
  remote_only: true
  accepted_cities:
    - your_city
  accepted_states: [your_state]
  rejected_cities: []  # e.g. [new york, san francisco] — cities you don't want to work in

comp:
  floor: 120000              # hard reject if comp_max < this (ceiling below floor)
  target: 140000             # positive scoring modifier at this level (comp_min >= target)
  stretch: 180000            # ranking/display context only

experience:
  years: 20
  anchor_phrase: "20+ years"  # the only acceptable experience claim

employment:
  commitment: "Full Time"     # required commitment type
  reject_commitments: []      # e.g. ["Part Time", "Contract"]
  role_type: "Individual Contributor"
  reject_role_types: ["Manager", "Director", "VP", "Head of"]

blacklist:
  - example-company-1
  - example-company-2

defense_blocklist:
  - example-defense-contractor-1
  - example-defense-contractor-2

resume:
  master_path: "data/master_resume.md"
  accuracy_rules_path: "config/accuracy_rules.yml"
  output_dir: "data/resumes"
  contact_urls:
    - "https://your-website.com"
    - "https://linkedin.com/in/yourprofile"
    - "https://github.com/yourusername"

cross_reference:
  repo_path: "~/projects/job-search"
  auto_pull: true

# Hard rejects — jobs matching these patterns are auto-rejected before scoring.
# Customize these for your own search. Remove entries that don't apply to you.
# unless_pattern: if set, the reject is skipped when the JD also matches this
# pattern (e.g. FedRAMP as nice-to-have vs required).
hard_rejects:
  - reason: "Relocation required"
    pattern: "relocation required"
  - reason: "Clearance required"
    pattern: "security clearance|active clearance|ts/sci|top secret"
  # Example with unless_pattern:
  # - reason: "FedRAMP required"
  #   pattern: "fedramp"
  #   unless_pattern: "nice.to.have|preferred|bonus|optional|desired|plus if|a plus|not required"
  # - reason: "Customer-facing/solutions role"
  #   pattern: "pre.?sales|solutions architect|customer success|technical account manager"
  # - reason: "Early career/junior"
  #   pattern: "early.?career|entry.?level|new.?grad|\\bjunior\\b|\\bintern\\b|\\binternship\\b|\\bassociate\\b"
  # - reason: "Defense/ITAR"
  #   pattern: "defense contractor|itar|classified"
  # - reason: "AI/ML Engineer (non-infra)"
  #   pattern: "ai/ml engineer|machine learning engineer"
  #   unless_pattern: "ml infra|ml platform|gpu infra|model serving|mlops|llmops|inference|ai infrastructure|llm platform|ai platform|observability|evals|reliability"

# Structured contact info — used by resume generator and analysis output.
# All fields optional; empty strings = not included.
contact:
  name: "Your Name"
  email: "you@example.com"
  phone: ""
  location: "Your City, ST"
  urls:
    github: "https://github.com/yourusername"
    linkedin: "https://linkedin.com/in/yourprofile"
    portfolio: "https://your-website.com"
    other: ""

# Free-form instructions that guide scoring and resume generation.
# This is the most important field for JD analysis quality — describe your
# positioning, target roles, proof artifacts, and any judgment notes.
instructions: "<Your positioning statement — describe your target roles, key skills, proof artifacts, and any judgment notes for JD analysis.>"

lifecycle:
  stale_after_days: 14  # jobs in applied/engaged with no activity for this many days are flagged stale
