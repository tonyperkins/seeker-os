# Seeker OS — Search Queries (EXAMPLE TEMPLATE)
# Copy to queries.yml and adjust. queries.yml is .gitignore'd.
# All queries default to max_pages: 1 (page 0 only — stays within robots.txt).
# Deeper pagination (max_pages: 2+) is explicit opt-in per query and crosses
# the robots.txt pagination line. Use sparingly with conservative request timing.

queries:
  # Customize these slugs for your target role(s).
  # Slugs correspond to hiring.cafe URL paths: /jobs/{slug}
  - source_id: hiring_cafe
    slug: senior-engineer-remote
    label: "Senior Engineer Remote"
    commitment: full_time
    max_pages: 1
    enabled: true
  - source_id: hiring_cafe
    slug: staff-engineer-remote
    label: "Staff Engineer Remote"
    commitment: full_time
    max_pages: 1
    enabled: true
  - source_id: hiring_cafe
    slug: principal-engineer-remote
    label: "Principal Engineer Remote"
    commitment: full_time
    max_pages: 1
    enabled: true
