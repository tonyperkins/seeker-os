# Seeker OS — Skip / Reject Reasons (EXAMPLE TEMPLATE)
# Copy to skip_reasons.yml and adjust. skip_reasons.yml is .gitignore'd.
#
# Structured reason choices presented when a job is skipped or rejected.
# The calibration report reads the reason from application_events metadata,
# so consistent use of these keys produces actionable analytics.
#
# Fields per reason:
#   key       — machine identifier written to event metadata
#   label     — human-readable label shown in the UI dropdown
#   hint      — placeholder text for the optional details textarea
#   free_text — if true, the details field is shown as a required textarea
#               (use for the "other" catch-all)

skip_reasons:
  - key: tech_stack_mismatch
    label: "Tech stack mismatch"
    hint: "e.g. 'Heavy on Java, I'm Python/Go'"
  - key: domain_mismatch
    label: "Domain mismatch"
    hint: "e.g. 'Finance domain, I prefer infra/platform'"
  - key: comp
    label: "Compensation too low"
    hint: "e.g. 'Max is $140K, below my floor'"
  - key: location_rto
    label: "Location / RTO"
    hint: "e.g. '4 days onsite, I need full remote'"
  - key: company_size
    label: "Company size"
    hint: "e.g. 'Too large / enterprise for my preference'"
  - key: compliance_core
    label: "Compliance / clearance"
    hint: "e.g. 'Requires security clearance'"
  - key: not_interested
    label: "Not interested"
    hint: "e.g. 'Just not interested in this role'"
  - key: other
    label: "Other"
    hint: "Describe what specifically doesn't fit..."
    free_text: true
