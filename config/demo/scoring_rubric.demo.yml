# Seeker OS — Demo Scoring Rubric (Fictional persona)
# Alex Rivera, SRE — zero real personal data.

scoring:
  post_threshold: 6.0
  per_company_cap: 3
  max_score: 10
  min_score: 0

  base_scores:
    - pattern: "(director|head|vp).*platform|director.*sre|director.*infrastructure|director.*reliability"
      score: 4.0
      label: "Director/Head SRE/Platform"
    - pattern: "(principal|staff).*sre|principal.*site reliability|staff.*site reliability|principal.*platform|staff.*platform"
      score: 4.0
      label: "Principal/Staff SRE"
    - pattern: "(principal|staff).*engineer|principal.*devops|staff.*devops|principal.*infrastructure|staff.*infrastructure"
      score: 4.0
      label: "Principal/Staff Engineer"
    - pattern: "(senior|sr\\.?).*sre|senior.*site reliability"
      score: 3.5
      label: "Senior SRE"
    - pattern: "(senior|sr\\.?).*platform|senior.*devops|senior.*infrastructure|senior.*cloud|senior.*reliability"
      score: 3.5
      label: "Senior Platform/DevOps"
    - pattern: "sre|site reliability|platform engineer|devops engineer|infrastructure engineer|cloud engineer|reliability engineer"
      score: 2.0
      label: "SRE/Platform title match"
    - score: 0
      label: "No title match"

  positive_modifiers:
    - signal: "austin_area"
      points: 1.5
      check: "location_local"
    - signal: "remote_us"
      pattern: "remote"
      points: 1.0
      check: "jd"
      requires: "united states|us.?based|within the us|us only|us-based|us time"
    - signal: "comp_target"
      points: 1.0
      check: "structured_comp"
      threshold: 180000
    - signal: "key_cloud"
      pattern: "aws|gcp|azure|kubernetes|terraform"
      points: 0.5
      check: "jd"
    - signal: "sre_culture"
      pattern: "blameless|postmortem|on-call|incident response|slo|error budget|chaos engineering"
      points: 0.5
      check: "jd"

  negative_modifiers:
    - signal: "relocation_required"
      pattern: "on.?site only|in.?office only|must.*relocat|relocation required|relocation assistance"
      points: -3.0
      check: "jd"
    - signal: "hybrid_non_local"
      pattern: "hybrid"
      points: -3.0
      check: "jd"
      unless: "austin|remote|tx|texas"
    - signal: "city_only_no_remote"
      points: -2.0
      check: "location_only"
    - signal: "comp_below_floor"
      points: -3.0
      check: "structured_comp"
      threshold_max: 150000
    - signal: "comp_marginal"
      points: -1.5
      check: "structured_comp"
      threshold_min: 150000
      threshold_max: 180000
    - signal: "people_management"
      pattern: "performance review|headcount|hiring decision|manage.*team of|direct reports|people management"
      points: -2.0
      check: "jd"
    - signal: "large_enterprise"
      pattern: "fortune\\s*(?:500|100|50)|\\b\\d{2,3},000\\+?\\s*employees|10,000\\+?\\s*employees|global enterprise"
      points: -0.5
      check: "jd"
      unless: "our customers|customers include|customers range|client.*fortune|fortune.*customer"
    - signal: "staffing_agency"
      pattern: "staffing|consulting llc|recruiting agency|talent solutions"
      points: -1.5
      check: "jd"
    - signal: "missing_location"
      points: -1.5
      check: "no_location_no_remote"

  freshness:
    boost_days: 7
    neutral_days: 14
    penalty_days: 30
    hard_filter_days: 30

  research_modifiers:
    - factor: "right_size_company"
      delta: 0.5
      confidence_threshold: 0.5
      source_section: "funding"
      headcount_max: 600
    - factor: "large_company_confirmed"
      delta: -1.5
      confidence_threshold: 0.5
      source_section: "funding"
      headcount_min: 3000
      suppresses: "large_enterprise"
    - factor: "recent_layoffs"
      delta: -1.5
      confidence_threshold: 0.5
      source_section: "funding"
    - factor: "down_round_runway_risk"
      delta: -2.0
      confidence_threshold: 0.5
      source_section: "funding"
    - factor: "healthy_runway"
      delta: 0.5
      confidence_threshold: 0.5
      source_section: "funding"
    - factor: "remote_walkback_rto"
      delta: -1.5
      confidence_threshold: 0.5
      source_section: "fit"
    - factor: "strong_negative_sentiment"
      delta: -1.0
      confidence_threshold: 0.6
      source_section: "sentiment"

  verdict_caps:
    APPLY: null
    CONDITIONAL: 7.0
    MONITOR: 5.0
    SKIP: 3.0

  comp_sanity_max: 10000000
  trusted_comp_sources: ["structured", "manual"]
