# Seeker OS — Demo Identity Rules (Fictional persona)
# Alex Rivera, SRE — zero real personal data.

identity:
  positioning: "I am a senior SRE and infrastructure engineer who builds reliable platforms, not a product manager or people-leader."
  work_eligibility: "US citizen, no sponsorship required."
  experience_anchor:
    phrase: "8+ years in software engineering and infrastructure"
    applies_to: "overall engineering career, not a specific stack"
    disallowed_variants:
      - "(10|12|15|20)\\+\\s*years"
      - "decades of experience"
      - "seasoned veteran"
  honest_qualifiers:
    - skill: "machine learning"
      framing: "not a primary skill; comfortable with ML infrastructure, not model training"
    - skill: "frontend development"
      framing: "can read and debug, but not a specialty"
  never_claim:
    - "Kubernetes expert"
    - "AWS solutions architect"
    - "certified"
    - "managed 20+ person team"
    - "IPO lead"
    - "Fortune 500 executive"
