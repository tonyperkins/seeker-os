# Seeker OS — LLM Providers & Models (EXAMPLE TEMPLATE)
# Copy to providers.yml and fill in your API keys. providers.yml is .gitignore'd.
# API keys are env var references (${VAR_NAME}), never literal in config files.
# Schema is validated in Phase 1; LLM calls begin in Phase 2.5+.
# See docs/LLM_ROUTING.md for full details.

providers:
  - id: anthropic_direct
    type: anthropic
    label: "Anthropic Direct"
    api_key: ${ANTHROPIC_API_KEY}
    enabled: true
    models:
      - id: claude-opus-4
        label: "Claude Opus 4"
        context_window: 200000
        max_output: 32000
        tags: [heavy]
      - id: claude-sonnet-4
        label: "Claude Sonnet 4"
        context_window: 200000
        max_output: 16000
        tags: [heavy, moderate]
      - id: claude-haiku-4
        label: "Claude Haiku 4"
        context_window: 200000
        max_output: 8192
        tags: [light]

  - id: kilo
    type: openai_compatible
    label: "Kilo Gateway"
    base_url: "https://kilo.gateway/v1"
    api_key: ${KILO_API_KEY}
    auto_fetch_models: true
    enabled: true
    models: []

  - id: ollama_local
    type: openai_compatible
    label: "Ollama (local)"
    base_url: "http://localhost:11434/v1"
    auto_fetch_models: true
    enabled: false
    models: []

tiers:
  heavy:    { provider: anthropic_direct, model: claude-opus-4 }
  moderate: { provider: anthropic_direct, model: claude-sonnet-4 }
  light:    { provider: anthropic_direct, model: claude-haiku-4 }

tasks:
  resume_generation_high_value: { tier: heavy, provider: anthropic_direct, model: claude-opus-4 }
  resume_generation_standard:   { tier: heavy, provider: anthropic_direct, model: claude-sonnet-4 }
  accuracy_validation:          { tier: light }
  onboarding_interview:         { tier: moderate }
